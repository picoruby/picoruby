<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>R2P2 Terminal - PicoRuby WASM</title>
  <link rel="stylesheet" href="test.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    body { margin: 2px auto; padding: 4px; }
    #not-supported {
      color: #f44; font-weight: bold; padding: 10px;
      background: #300; border: 1px solid #f44; margin: 2px 0;
    }
    .controls { margin: 0 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls button { padding: 6px 14px; cursor: pointer; }
    .controls select, .controls label { padding: 4px; }
    #status { font-weight: bold; padding: 4px 8px; border-radius: 3px; }
    #status.connected    { color: #0f0; background: #030; border: 1px solid #0f0; }
    #status.disconnected { color: #f44; background: #200; border: 1px solid #f44; }
    #terminal-container {
      margin: 2px 0;
      border: 2px solid #555;
      background: #000;
      padding: 4px;
      resize: vertical;
      overflow: hidden;
      min-height: 60px;
    }
    p.hint { color: #888; font-size: 0.85em; margin: 4px 0; }
    .font-ctrl { display: inline-flex; align-items: center; gap: 2px; }
    .font-ctrl button { padding: 1px 7px; cursor: pointer; font-size: 8px; line-height: 1; }
    .font-ctrl input[type=number] { width: 38px; text-align: center; padding: 2px 0; -moz-appearance: textfield; }
    .font-ctrl input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    /* DFU section */
    #dfu-section { margin: 2px 0; padding: 2px 4px; border: 1px solid #555; }
    #dfu-section legend { font-weight: bold; padding: 0 2px; }
    #path-input { font-family: monospace; font-size: 13px; }
    #editor-container {
      display: flex;
      height: 300px;
      gap: 0;
      margin: 2px 0;
      border: 1px solid #444;
      resize: vertical;
      overflow: hidden;
    }
    #editor {
      flex: 0.7;
      font-family: 'Courier Prime', Courier, monospace;
      font-size: 15px;
      background: #1a1a1a;
      color: #f8f8f2;
      border: none;
      border-right: 1px solid #666;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      tab-size: 2;
      display: block;
      overflow-y: auto;
    }
    #resizer {
      width: 4px;
      background: linear-gradient(to right, #333, #555, #333);
      cursor: col-resize;
      user-select: none;
      transition: background 0.2s;
    }
    #resizer:hover {
      background: linear-gradient(to right, #555, #fff, #555);
    }
    #dfu-log {
      flex: 0.3;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #1a1a1a;
      color: #0f0;
      padding: 4px;
      overflow-y: auto;
      border: none;
      border-left: 1px solid #666;
    }
  </style>
</head>
<body>
  <div id="not-supported" style="display:none">
    Web Serial API is not supported in this browser.
    Please use <strong>Google Chrome</strong> or <strong>Microsoft Edge</strong> (desktop, version 89+).
  </div>

  <div class="controls">
    <button id="connect-btn">Connect</button>
    <label>Baud:
      <select id="baud-rate">
        <option value="9600">9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="921600">921600</option>
      </select>
    </label>
    <label>Term font:
      <span class="font-ctrl">
        <button id="term-font-minus">−</button>
        <input id="term-font-size" type="number" value="15" min="8" max="32">
        <button id="term-font-plus">+</button>
      </span>
    </label>
    <span id="status" class="disconnected">Disconnected</span>
  </div>

  <div id="terminal-container"></div>

  <fieldset id="dfu-section">
    <legend>File Editor (by dfucat and dfucli)</legend>
    <div class="controls">
      <button id="load-btn" disabled>▼ Download</button>
      <input id="path-input" type="text" placeholder="/path/to/file.rb" style="width:220px">
      <button id="save-btn" disabled>▲ Upload</button>
      <label>Editor font:
        <span class="font-ctrl">
          <button id="editor-font-minus">−</button>
          <input id="editor-font-size" type="number" value="15" min="8" max="24">
          <button id="editor-font-plus">+</button>
        </span>
      </label>
    </div>
    <div id="editor-container">
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="resizer"></div>
      <div id="dfu-log"></div>
    </div>
  </fieldset>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script>
    // ---------------------------------------------------------------------------
    // Globals exposed to PicoRuby WASM
    // ---------------------------------------------------------------------------
    let port = null;
    let captureMode = false;
    let captureBuffer = '';

    window.isPortConnected = () => port !== null;

    window.startCapture = () => {
      captureBuffer = '';
      captureMode = true;
    };

    window.peekCapture = () => captureBuffer;

    window.stopAndGetCapture = () => {
      captureMode = false;
      return captureBuffer;
    };

    window.sendTextToPort = async (str) => {
      if (!port) return;
      const encoder = new TextEncoder();
      const writer = port.writable.getWriter();
      await writer.write(encoder.encode(str));
      writer.releaseLock();
    };

    // Parse output from dfucat command: extract content between DFUCAT_BEGIN and DFUCAT_END.
    // Returns { content } on success, { error } on DFUCAT_ERROR, or null if markers not found.
    function parseDfucatOutput(raw) {
      const stripped = raw
        .replace(/\x1b\[[0-9;?<>=!]*[A-Za-z@`]/g, '')
        .replace(/\x1b[^[]/g, '');
      const normalized = stripped.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const errorMatch = normalized.match(/DFUCAT_ERROR:([^\n]*)/);
      if (errorMatch) return { error: errorMatch[1] };
      const beginIdx = normalized.indexOf('DFUCAT_BEGIN\n');
      if (beginIdx === -1) return null;
      const contentStart = beginIdx + 'DFUCAT_BEGIN\n'.length;
      const endIdx = normalized.indexOf('DFUCAT_END', contentStart);
      if (endIdx === -1) return null;
      return { content: normalized.slice(contentStart, endIdx) };
    }

    // hex: string of hex pairs e.g. "44465500..." (no spaces)
    window.sendHexToPort = async (hex) => {
      if (!port) return;
      const len = hex.length / 2;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
      }
      const writer = port.writable.getWriter();
      await writer.write(bytes);
      writer.releaseLock();
    };

    // ---------------------------------------------------------------------------
    // Terminal setup
    // ---------------------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
      const connectBtn  = document.getElementById('connect-btn');
      const baudSelect  = document.getElementById('baud-rate');
      const statusSpan  = document.getElementById('status');
      const notSupported = document.getElementById('not-supported');
      const container   = document.getElementById('terminal-container');
      const saveBtnEl   = document.getElementById('save-btn');
      const loadBtnEl   = document.getElementById('load-btn');
      const pathInputEl = document.getElementById('path-input');

      if (!('serial' in navigator)) {
        notSupported.style.display = 'block';
        connectBtn.disabled = true;
        return;
      }

      const { Terminal } = window;
      const { FitAddon } = window.FitAddon;
      const terminal = new Terminal({
        scrollback: 1000,
        cursorBlink: true,
        convertEol: true,
        fontFamily: '"Ubuntu Mono", Menlo, Consolas, "DejaVu Sans Mono", "Courier New", Courier, monospace',
        fontSize: 15,
        theme: { background: '#000000' },
      });
      const fitAddon = new FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(container);
      fitAddon.fit();

      window.addEventListener('resize', () => fitAddon.fit());
      new ResizeObserver(() => fitAddon.fit()).observe(container);
      container.addEventListener('click', () => terminal.focus());

      let reader = null;
      let autoReconnect = false;

      function updateStatus(text, connected) {
        statusSpan.textContent = text;
        statusSpan.className = connected ? 'connected' : 'disconnected';
      }

      function updateDfuButtons() {
        const hasPath = pathInputEl.value.trim() !== '';
        const connected = port !== null;
        loadBtnEl.disabled = !(connected && hasPath);
        saveBtnEl.disabled = !(connected && hasPath);
      }

      function setDfuConnected(_connected) {
        updateDfuButtons();
      }

      terminal.onData((data) => {
        if (port) {
          const encoder = new TextEncoder();
          const writer = port.writable.getWriter();
          writer.write(encoder.encode(data)).then(() => writer.releaseLock());
        }
      });

      async function readFromPort() {
        const decoder = new TextDecoder('utf-8');
        try {
          reader = port.readable.getReader();
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
              const chars = decoder.decode(value, { stream: true });
              if (captureMode) captureBuffer += chars;
              terminal.write(chars);
            }
          }
        } catch (err) {
          console.error('Serial read error:', err);
        } finally {
          if (reader) reader.releaseLock();
          disconnect();
        }
      }

      async function openPort(serialPort) {
        const baudRate = parseInt(baudSelect.value, 10);
        port = serialPort;
        await port.open({ baudRate });
        autoReconnect = true;
        updateStatus('Connected', true);
        setDfuConnected(true);
        connectBtn.textContent = 'Disconnect';
        terminal.focus();
        readFromPort();
      }

      async function connect() {
        if (port) { disconnect(); return; }
        try {
          const serialPort = await navigator.serial.requestPort();
          terminal.reset();
          await openPort(serialPort);
        } catch (err) {
          console.error('Connect error:', err);
          updateStatus('Disconnected', false);
          port = null;
        }
      }

      async function disconnect() {
        if (reader) {
          try { await reader.cancel(); } catch (e) { /* ignore */ }
          reader = null;
        }
        if (port) {
          try { await port.close(); } catch (e) { /* ignore */ }
          port = null;
        }
        updateStatus('Disconnected', false);
        setDfuConnected(false);
        connectBtn.textContent = 'Connect';
      }

      navigator.serial.addEventListener('connect', async (e) => {
        if (port || !autoReconnect) return;
        const serialPort = e.target;
        updateStatus('Reconnecting...', false);
        await new Promise(r => setTimeout(r, 1500));
        try {
          await openPort(serialPort);
          terminal.writeln('[Reconnected]');
        } catch (err) {
          console.error('Auto-reconnect failed:', err);
          updateStatus('Disconnected', false);
        }
      });

      navigator.serial.addEventListener('disconnect', () => {
        if (!port) return;
        terminal.writeln('\r\n[Serial port disconnected]');
        disconnect();
      });

      function appendDfuLog(msg) {
        const log = document.getElementById('dfu-log');
        log.textContent += msg + '\n';
        log.scrollTop = log.scrollHeight;
      }

      async function loadFileFromDevice(path) {
        loadBtnEl.disabled = true;
        saveBtnEl.disabled = true;
        appendDfuLog('[*] Loading ' + path + ' ...');
        captureBuffer = '';
        captureMode = true;
        await sendTextToPort('dfucat ' + path + '\n');
        await new Promise((resolve) => {
          const maxWait = 10000;
          const interval = 200;
          let waited = 0;
          const check = () => {
            waited += interval;
            if (captureBuffer.includes('DFUCAT_END') ||
                captureBuffer.includes('DFUCAT_ERROR:') ||
                waited >= maxWait) {
              resolve();
            } else {
              setTimeout(check, interval);
            }
          };
          setTimeout(check, interval);
        });
        captureMode = false;
        const result = parseDfucatOutput(captureBuffer);
        if (result === null) {
          appendDfuLog('[-] Load failed: no DFUCAT response');
          console.log('[load] captureBuffer:', JSON.stringify(captureBuffer));
        } else if (result.error) {
          appendDfuLog('[-] ' + result.error);
        } else {
          document.getElementById('editor').value = result.content;
          appendDfuLog('[+] Loaded ' + result.content.length + ' chars');
        }
        updateDfuButtons();
      }

      // Terminal font size
      const termFontInput = document.getElementById('term-font-size');
      function setTermFont(val) {
        val = Math.max(8, Math.min(32, val));
        termFontInput.value = val;
        terminal.options.fontSize = val;
        fitAddon.fit();
      }
      document.getElementById('term-font-minus').addEventListener('click', () => setTermFont(parseInt(termFontInput.value) - 1));
      document.getElementById('term-font-plus').addEventListener('click',  () => setTermFont(parseInt(termFontInput.value) + 1));
      termFontInput.addEventListener('change', () => setTermFont(parseInt(termFontInput.value) || 15));

      // Editor font size
      const editorEl2 = document.getElementById('editor');
      const editorFontInput = document.getElementById('editor-font-size');
      function setEditorFont(val) {
        val = Math.max(8, Math.min(24, val));
        editorFontInput.value = val;
        editorEl2.style.fontSize = val + 'px';
      }
      document.getElementById('editor-font-minus').addEventListener('click', () => setEditorFont(parseInt(editorFontInput.value) - 1));
      document.getElementById('editor-font-plus').addEventListener('click',  () => setEditorFont(parseInt(editorFontInput.value) + 1));
      editorFontInput.addEventListener('change', () => setEditorFont(parseInt(editorFontInput.value) || 15));

      connectBtn.addEventListener('click', () => connect());
      pathInputEl.addEventListener('input', updateDfuButtons);
      loadBtnEl.addEventListener('click', () => {
        const path = pathInputEl.value.trim();
        if (path && port) loadFileFromDevice(path);
      });

      // Resizer functionality for editor and dfu-log
      const resizer = document.getElementById('resizer');
      const editorContainer = document.getElementById('editor-container');
      let isResizing = false;

      resizer.addEventListener('mousedown', () => {
        isResizing = true;
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const containerRect = editorContainer.getBoundingClientRect();
        const newLeftX = e.clientX - containerRect.left;
        const maxX = containerRect.width - 20; // min width for right panel
        const minX = 100; // min width for left panel
        const constrainedX = Math.max(minX, Math.min(newLeftX, maxX));
        const leftRatio = constrainedX / containerRect.width;
        const rightRatio = 1 - leftRatio;
        editorEl2.style.flex = leftRatio;
        document.getElementById('dfu-log').style.flex = rightRatio;
      });

      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          document.body.style.userSelect = '';
          document.body.style.cursor = '';
        }
      });
    });
  </script>

  <script type="text/ruby">
    require 'js'

    # ---------------------------------------------------------------------------
    # CRC32 (standard polynomial 0xEDB88320, compatible with DFU::Updater)
    # ---------------------------------------------------------------------------
    CRC32_TABLE = Array.new(256) do |i|
      c = i
      8.times { c = ((c & 1) == 1) ? (0xEDB88320 ^ (c >> 1)) : (c >> 1) }
      c
    end

    def crc32(data)
      crc = 0xFFFFFFFF
      data.bytes.each { |b| crc = CRC32_TABLE[(crc ^ b) & 0xFF] ^ (crc >> 8) }
      crc ^ 0xFFFFFFFF
    end

    # ---------------------------------------------------------------------------
    # DFU header helpers (big-endian)
    # ---------------------------------------------------------------------------
    def be32(n)
      [((n >> 24) & 0xFF).chr,
       ((n >> 16) & 0xFF).chr,
       ((n >>  8) & 0xFF).chr,
        (n        & 0xFF).chr].join
    end

    def be16(n)
      [((n >> 8) & 0xFF).chr,
        (n       & 0xFF).chr].join
    end

    # Build a 19-byte DFU header for Ruby source (type="RUBY").
    def build_dfu_header(source)
      crc = crc32(source)
      "DFU\0" + 1.chr + "RUBY" + be32(source.bytesize) + be32(crc) + be16(0)
    end

    # Encode a binary String as a hex string for sendHexToPort().
    def to_hex(str)
      str.bytes.map { |b| b < 16 ? "0#{b.to_s(16)}" : b.to_s(16) }.join
    end

    # ---------------------------------------------------------------------------
    # App
    # ---------------------------------------------------------------------------
    class App
      DFU_RESPONSE_TIMEOUT = 5.0

      def initialize
        @doc = JS.document
        bind_events
        append_log("[*] Ready. Connect a serial port to use the file updater.")
      end

      def el(id)
        @doc.getElementById(id)
      end

      def append_log(msg)
        log = el('dfu-log')
        log[:textContent] = log[:textContent].to_s + msg + "\n"
        log[:scrollTop] = log[:scrollHeight]
      end

      def current_path
        p = el('path-input')[:value].to_s.strip
        p.empty? ? nil : p
      end

      def bind_events
        el('save-btn').addEventListener('click') { |_| do_save }
      end

      # Send "dfucli [path]", wait, then send DFU packet containing editor source.
      def do_save
        unless JS.global.isPortConnected()
          append_log("[-] Not connected")
          return
        end

        code = el('editor')[:value].to_s
        if code.strip.empty?
          append_log("[-] Editor is empty")
          return
        end

        path = current_path
        cmd = path ? "dfucli #{path}\n" : "dfucli\n"
        append_log("[*] Running: #{cmd.chomp}")
        JS.global.sendTextToPort(cmd)
        sleep 0.5  # wait for dfucli to start and enter receive loop

        # Build DFU packet: 19-byte header + Ruby source
        header  = build_dfu_header(code)
        payload = header + code
        append_log("[*] Sending DFU packet: #{payload.bytesize} bytes (header=19 source=#{code.bytesize})")

        JS.global.startCapture()
        JS.global.sendHexToPort(to_hex(payload))

        # Wait for "OK" or "ERROR" from device (visible in terminal and capture)
        waited = 0.0
        while waited < DFU_RESPONSE_TIMEOUT
          sleep 0.3
          waited += 0.3
          cap = JS.global.peekCapture().to_s
          break if cap.index("OK") || cap.index("ERROR")
        end

        resp = JS.global.stopAndGetCapture().to_s
        if resp.index("OK")
          append_log("[+] Success!")
        elsif resp.index("ERROR")
          idx = resp.index("ERROR")
          append_log("[-] #{resp[idx, 60].to_s.strip}")
        else
          append_log("[?] No response after #{DFU_RESPONSE_TIMEOUT}s (check terminal)")
        end
      end
    end

    App.new
  </script>

  <script src="init.iife.js"></script>
</body>
</html>
