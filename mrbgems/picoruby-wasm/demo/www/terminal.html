<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>R2P2 Terminal - PicoRuby WASM</title>
  <link rel="stylesheet" href="test.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
  <style>
    body { margin: 2px auto; padding: 4px; }
    #not-supported {
      color: #f44; font-weight: bold; padding: 10px;
      background: #300; border: 1px solid #f44; margin: 2px 0;
    }
    .controls { margin: 0 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls button { padding: 6px 14px; cursor: pointer; }
    .controls select, .controls label { padding: 4px; }
    #status { font-weight: bold; padding: 4px 8px; border-radius: 3px; }
    #status.connected    { color: #0f0; background: #030; border: 1px solid #0f0; }
    #status.disconnected { color: #f44; background: #200; border: 1px solid #f44; }
    #terminal-container {
      margin: 2px 0;
      border: 2px solid #555;
      background: #000;
      padding: 4px;
      resize: vertical;
      overflow: hidden;
      min-height: 60px;
    }
    p.hint { color: #888; font-size: 0.85em; margin: 4px 0; }
    .font-ctrl { display: inline-flex; align-items: center; gap: 2px; }
    .font-ctrl button { padding: 1px 7px; cursor: pointer; font-size: 8px; line-height: 1; }
    .font-ctrl input[type=number] { width: 38px; text-align: center; padding: 2px 0; -moz-appearance: textfield; }
    .font-ctrl input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    /* DFU section */
    #dfu-section { margin: 2px 0; padding: 2px 4px; border: 1px solid #555; }
    #dfu-section legend { font-weight: bold; padding: 0 2px; }
    #path-input { font-family: monospace; font-size: 13px; }
    #editor-container {
      display: flex;
      height: 300px;
      gap: 0;
      margin: 2px 0;
      border: 1px solid #444;
      resize: vertical;
      overflow: hidden;
    }
    #editor {
      flex: 0.5;
      font-family: 'Courier Prime', Courier, monospace;
      font-size: 15px;
      background: #1a1a1a;
      color: #f8f8f2;
      border: none;
      border-right: 1px solid #666;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      tab-size: 2;
      display: block;
      overflow-y: auto;
    }
    #resizer {
      width: 4px;
      background: linear-gradient(to right, #333, #555, #333);
      cursor: col-resize;
      user-select: none;
      transition: background 0.2s;
    }
    #resizer:hover {
      background: linear-gradient(to right, #555, #fff, #555);
    }
    #dfu-log {
      flex: 0.5;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #1a1a1a;
      color: #0f0;
      padding: 4px;
      overflow-y: auto;
      border: none;
      border-left: 1px solid #666;
    }
  </style>
</head>
<body>
  <div id="not-supported" style="display:none">
    Web Serial API is not supported in this browser.
    Please use <strong>Google Chrome</strong> or <strong>Microsoft Edge</strong> (desktop, version 89+).
  </div>

  <div class="controls">
    <button id="connect-btn">Connect</button>
    <label>Baud:
      <select id="baud-rate">
        <option value="9600">9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="921600">921600</option>
      </select>
    </label>
    <label>Term font:
      <span class="font-ctrl">
        <button id="term-font-minus">−</button>
        <input id="term-font-size" type="number" value="15" min="8" max="32">
        <button id="term-font-plus">+</button>
      </span>
    </label>
    <span id="status" class="disconnected">Disconnected</span>
  </div>

  <div id="terminal-container"></div>

  <fieldset id="dfu-section">
    <legend>File Editor (by dfucat and dfucli)</legend>
    <div class="controls">
      <button id="load-btn" disabled>▼ Download</button>
      <input id="path-input" type="text" placeholder="/home/app.rb" style="width:220px">
      <button id="save-btn" disabled>▲ Upload</button>
      <label>Editor font:
        <span class="font-ctrl">
          <button id="editor-font-minus">−</button>
          <input id="editor-font-size" type="number" value="15" min="8" max="24">
          <button id="editor-font-plus">+</button>
        </span>
      </label>
    </div>
    <div id="editor-container">
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="resizer"></div>
      <div id="dfu-log"></div>
    </div>
  </fieldset>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script>
    // ---------------------------------------------------------------------------
    // Globals exposed to PicoRuby WASM
    // ---------------------------------------------------------------------------
    let port = null;
    let captureMode = false;
    let captureBuffer = '';

    window.isPortConnected = () => port !== null;

    window.startCapture = () => {
      captureBuffer = '';
      captureMode = true;
    };

    window.peekCapture = () => captureBuffer;

    window.stopAndGetCapture = () => {
      captureMode = false;
      return captureBuffer;
    };

    window.sendTextToPort = async (str) => {
      if (!port) return;
      const encoder = new TextEncoder();
      const writer = port.writable.getWriter();
      await writer.write(encoder.encode(str));
      writer.releaseLock();
    };

    function handleDfucatResult(raw) {
      globalThis.picorubyGenericCallbacks['handleDfucatResult'](raw);
    }

    // hex: string of hex pairs e.g. "44465500..." (no spaces)
    // Sends in small chunks to avoid overflowing the device ring buffer (256 bytes).
    window.sendHexToPort = async (hex) => {
      if (!port) return;
      const len = hex.length / 2;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
      }
      const CHUNK = 64;
      const writer = port.writable.getWriter();
      for (let off = 0; off < bytes.length; off += CHUNK) {
        const end = Math.min(off + CHUNK, bytes.length);
        await writer.write(bytes.subarray(off, end));
        if (end < bytes.length) {
          await new Promise(r => setTimeout(r, 10));
        }
      }
      writer.releaseLock();
    };

    // ---------------------------------------------------------------------------
    // Terminal setup
    // ---------------------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
      const connectBtn  = document.getElementById('connect-btn');
      const baudSelect  = document.getElementById('baud-rate');
      const statusSpan  = document.getElementById('status');
      const notSupported = document.getElementById('not-supported');
      const container   = document.getElementById('terminal-container');
      const saveBtnEl   = document.getElementById('save-btn');
      const loadBtnEl   = document.getElementById('load-btn');
      const pathInputEl = document.getElementById('path-input');

      if (!('serial' in navigator)) {
        notSupported.style.display = 'block';
        connectBtn.disabled = true;
        return;
      }

      const { Terminal } = window;
      const { FitAddon } = window.FitAddon;
      const terminal = new Terminal({
        scrollback: 1000,
        cursorBlink: true,
        convertEol: true,
        fontFamily: '"Ubuntu Mono", Menlo, Consolas, "DejaVu Sans Mono", "Courier New", Courier, monospace',
        fontSize: 15,
        theme: { background: '#000000' },
      });
      const fitAddon = new FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(container);
      fitAddon.fit();
      window.terminal = terminal;
      window.fitAddon = fitAddon;

      new ResizeObserver(() => fitAddon.fit()).observe(container);

      let reader = null;
      let autoReconnect = false;

      function updateStatus(text, connected) {
        globalThis.picorubyGenericCallbacks['updateStatus'](text, connected);
      }

      function updateDfuButtons() {
        globalThis.picorubyGenericCallbacks['updateDfuButtons']();
      }

      terminal.onData((data) => {
        if (port) {
          const encoder = new TextEncoder();
          const writer = port.writable.getWriter();
          writer.write(encoder.encode(data)).then(() => writer.releaseLock());
        }
      });

      async function readFromPort() {
        const decoder = new TextDecoder('utf-8');
        try {
          reader = port.readable.getReader();
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
              const chars = decoder.decode(value, { stream: true });
              if (captureMode) captureBuffer += chars;
              terminal.write(chars);
            }
          }
        } catch (err) {
          console.error('Serial read error:', err);
        } finally {
          if (reader) reader.releaseLock();
          disconnect();
        }
      }

      async function openPort(serialPort) {
        const baudRate = parseInt(baudSelect.value, 10);
        port = serialPort;
        await port.open({ baudRate });
        autoReconnect = true;
        updateStatus('Connected', true);
        updateDfuButtons();
        connectBtn.textContent = 'Disconnect';
        terminal.focus();
        readFromPort();
      }

      async function connect() {
        if (port) { disconnect(); return; }
        try {
          const serialPort = await navigator.serial.requestPort();
          terminal.reset();
          await openPort(serialPort);
        } catch (err) {
          console.error('Connect error:', err);
          updateStatus('Disconnected', false);
          port = null;
        }
      }

      async function disconnect() {
        if (reader) {
          try { await reader.cancel(); } catch (e) { /* ignore */ }
          reader = null;
        }
        if (port) {
          try { await port.close(); } catch (e) { /* ignore */ }
          port = null;
        }
        updateStatus('Disconnected', false);
        updateDfuButtons();
        connectBtn.textContent = 'Connect';
      }

      navigator.serial.addEventListener('connect', async (e) => {
        if (port || !autoReconnect) return;
        const serialPort = e.target;
        updateStatus('Reconnecting...', false);
        await new Promise(r => setTimeout(r, 1500));
        try {
          await openPort(serialPort);
          terminal.writeln('[Reconnected]');
        } catch (err) {
          console.error('Auto-reconnect failed:', err);
          updateStatus('Disconnected', false);
        }
      });

      navigator.serial.addEventListener('disconnect', () => {
        if (!port) return;
        terminal.writeln('\r\n[Serial port disconnected]');
        disconnect();
      });

      function appendDfuLog(msg) {
        globalThis.picorubyGenericCallbacks['appendDfuLog'](msg);
      }

      async function loadFileFromDevice(path) {
        loadBtnEl.disabled = true;
        saveBtnEl.disabled = true;
        appendDfuLog('[*] Loading ' + path + ' ...');
        captureBuffer = '';
        captureMode = true;
        await sendTextToPort('dfucat ' + path + '\n');
        await new Promise((resolve) => {
          const maxWait = 10000;
          const interval = 200;
          let waited = 0;
          const check = () => {
            waited += interval;
            if (captureBuffer.includes('DFUCAT_END') ||
                captureBuffer.includes('DFUCAT_ERROR:') ||
                waited >= maxWait) {
              resolve();
            } else {
              setTimeout(check, interval);
            }
          };
          setTimeout(check, interval);
        });
        captureMode = false;
        handleDfucatResult(captureBuffer);
        updateDfuButtons();
      }

      window.connect = connect;
      window.loadFileFromDevice = loadFileFromDevice;

    });
  </script>

  <script type="text/ruby">
    require 'js'

    # ---------------------------------------------------------------------------
    # CRC32 (standard polynomial 0xEDB88320, compatible with DFU::Updater)
    # ---------------------------------------------------------------------------
    CRC32_TABLE = Array.new(256) do |i|
      c = i
      8.times { c = ((c & 1) == 1) ? (0xEDB88320 ^ (c >> 1)) : (c >> 1) }
      c
    end

    def crc32(data)
      crc = 0xFFFFFFFF
      data.bytes.each { |b| crc = CRC32_TABLE[(crc ^ b) & 0xFF] ^ (crc >> 8) }
      crc ^ 0xFFFFFFFF
    end

    # ---------------------------------------------------------------------------
    # DFU header helpers (big-endian)
    # ---------------------------------------------------------------------------
    def be32(n)
      [((n >> 24) & 0xFF).chr,
       ((n >> 16) & 0xFF).chr,
       ((n >>  8) & 0xFF).chr,
        (n        & 0xFF).chr].join
    end

    def be16(n)
      [((n >> 8) & 0xFF).chr,
        (n       & 0xFF).chr].join
    end

    # Build a 19-byte DFU header for Ruby source (type="RUBY").
    def build_dfu_header(source)
      crc = crc32(source)
      "DFU\0" + 1.chr + "RUBY" + be32(source.bytesize) + be32(crc) + be16(0)
    end

    # Encode a binary String as a hex string for sendHexToPort().
    def to_hex(str)
      str.bytes.map { |b| b < 16 ? "0#{b.to_s(16)}" : b.to_s(16) }.join
    end

    # ---------------------------------------------------------------------------
    # App
    # ---------------------------------------------------------------------------
    class App
      DFU_RESPONSE_TIMEOUT = 5000

      def initialize
        @doc = JS.document
        register_callbacks
        bind_events
        append_log("[*] Ready. Connect a serial port to use the file updater.")
      end

      def el(id)
        @doc.getElementById(id)
      end

      def update_status(text, connected)
        status = el('status')
        status[:textContent] = text
        status[:className] = connected ? 'connected' : 'disconnected'
      end

      def set_editor_font(val)
        val = [[8, val].max, 24].min
        el('editor-font-size')[:value] = val
        el('editor').style.fontSize = "#{val}px"
      end

      def set_term_font(val)
        val = [[8, val].max, 32].min
        el('term-font-size')[:value] = val
        JS.global[:terminal][:options][:fontSize] = val
        JS.global[:fitAddon].fit
      end

      def update_dfu_buttons
        has_path = !el('path-input')[:value].to_s.strip.empty?
        connected = JS.global.isPortConnected() == true
        enabled = connected && has_path
        el('load-btn')[:disabled] = !enabled
        el('save-btn')[:disabled] = !enabled
      end

      def register_callbacks
        app = self
        JS::Object.register_callback('updateStatus') do |text, connected|
          app.update_status(text.to_s, connected == true)
        end
        JS::Object.register_callback('updateDfuButtons') do
          app.update_dfu_buttons
        end
        JS::Object.register_callback('appendDfuLog') do |msg|
          app.append_log(msg.to_s)
        end
        JS::Object.register_callback('handleDfucatResult') do |raw|
          app.handle_dfucat_result(raw.to_s)
        end
      end

      def append_log(msg)
        log = el('dfu-log')
        log[:textContent] = log[:textContent].to_s + msg + "\n"
        log[:scrollTop] = log[:scrollHeight]
      end

      def current_path
        p = el('path-input')[:value].to_s.strip
        p.empty? ? nil : p
      end

      def bind_events
        el('connect-btn').addEventListener('click') { |_| JS.global.connect() }
        el('save-btn').addEventListener('click') { |_| do_save }
        el('load-btn').addEventListener('click') { |_|
          path = current_path
          JS.global.loadFileFromDevice(path) if path && JS.global.isPortConnected() == true
        }
        el('terminal-container').addEventListener('click') { |_| JS.global[:terminal].focus }
        JS.global.addEventListener('resize') { |_| JS.global[:fitAddon].fit }
        bind_font_controls
        bind_resizer
        el('path-input').addEventListener('input') { |_| update_dfu_buttons }
      end

      def bind_font_controls
        term_font_input = el('term-font-size')
        el('term-font-minus').addEventListener('click') { |_| set_term_font(term_font_input[:value].to_i - 1) }
        el('term-font-plus').addEventListener('click')  { |_| set_term_font(term_font_input[:value].to_i + 1) }
        term_font_input.addEventListener('change') { |_| set_term_font(term_font_input[:value].to_i) }

        editor_font_input = el('editor-font-size')
        el('editor-font-minus').addEventListener('click') { |_| set_editor_font(editor_font_input[:value].to_i - 1) }
        el('editor-font-plus').addEventListener('click')  { |_| set_editor_font(editor_font_input[:value].to_i + 1) }
        editor_font_input.addEventListener('change') { |_| set_editor_font(editor_font_input[:value].to_i) }
      end

      def bind_resizer
        resizer          = el('resizer')
        editor_container = el('editor-container')
        editor_el        = el('editor')
        dfu_log_el       = el('dfu-log')
        body             = @doc.body
        is_resizing      = false

        resizer.addEventListener('mousedown') { |_|
          is_resizing = true
          body.style.userSelect = 'none'
          body.style.cursor = 'col-resize'
        }

        @doc.addEventListener('mousemove') { |e|
          next unless is_resizing
          rect        = editor_container.getBoundingClientRect()
          new_left_x  = e.clientX.to_f - rect.left.to_f
          max_x       = rect.width.to_f - 20.0
          constrained = [100.0, [new_left_x, max_x].min].max
          left_ratio  = constrained / rect.width.to_f
          right_ratio = 1.0 - left_ratio
          editor_el.style.flex  = left_ratio.to_s
          dfu_log_el.style.flex = right_ratio.to_s
        }

        @doc.addEventListener('mouseup') { |_|
          if is_resizing
            is_resizing = false
            body.style.userSelect = ''
            body.style.cursor = ''
          end
        }
      end

      # Strip ANSI escape sequences from a string without regex.
      def strip_ansi(str)
        result = ""
        i = 0
        len = str.bytesize
        while i < len
          b = str.getbyte(i)
          if b == 0x1b
            i += 1
            if i < len && str.getbyte(i) == 0x5b # '['
              i += 1
              while i < len
                b = str.getbyte(i)
                i += 1
                break if (b >= 0x41 && b <= 0x5a) || (b >= 0x61 && b <= 0x7a) || b == 0x40 || b == 0x60
              end
            elsif i < len
              i += 1
            end
          else
            result << b.chr
            i += 1
          end
        end
        result
      end

      # Parse output from dfucat command: extract content between DFUCAT_BEGIN and DFUCAT_END.
      # Returns { content: } on success, { error: } on DFUCAT_ERROR, or nil if markers not found.
      def parse_dfucat_output(raw)
        normalized = strip_ansi(raw).gsub("\r\n", "\n").gsub("\r", "\n")
        error_marker = "DFUCAT_ERROR:"
        error_idx = normalized.index(error_marker)
        if error_idx
          error_end = normalized.index("\n", error_idx) || normalized.length
          return { error: normalized[(error_idx + error_marker.length)...error_end] }
        end
        begin_marker = "DFUCAT_BEGIN\n"
        begin_idx = normalized.index(begin_marker)
        return nil unless begin_idx
        content_start = begin_idx + begin_marker.length
        end_idx = normalized.index("DFUCAT_END", content_start)
        return nil unless end_idx
        { content: normalized[content_start...end_idx] }
      end

      def handle_dfucat_result(raw)
        result = parse_dfucat_output(raw)
        if result.nil?
          append_log("[-] Load failed: no DFUCAT response")
        elsif result[:error]
          append_log("[-] #{result[:error]}")
        else
          el('editor')[:value] = result[:content]
          append_log("[+] Loaded #{result[:content].length} chars")
        end
      end

      # Send "dfucli [path]", wait, then send DFU packet containing editor source.
      def do_save
        unless JS.global.isPortConnected()
          append_log("[-] Not connected")
          return
        end

        code = el('editor')[:value].to_s
        if code.strip.empty?
          append_log("[-] Editor is empty")
          return
        end

        path = current_path
        cmd = path ? "dfucli #{path}\n" : "dfucli\n"
        append_log("[*] Running: #{cmd.chomp}")
        JS.global.startCapture()
        JS.global.sendTextToPort(cmd)

        # Wait for dfucli to print "[recv]" (ready to receive)
        waited = 0
        ready = false
        while waited < 3000
          sleep_ms 100
          waited += 100
          cap = JS.global.peekCapture().to_s
          if cap.index("[recv]")
            ready = true
            break
          end
        end
        unless ready
          JS.global.stopAndGetCapture()
          append_log("[-] dfucli did not become ready within 3s")
          return
        end

        # Build DFU packet: 19-byte header + Ruby source
        header  = build_dfu_header(code)
        payload = header + code
        append_log("[*] Sending DFU packet: #{payload.bytesize} bytes (header=19 source=#{code.bytesize})")

        JS.global.sendHexToPort(to_hex(payload))

        # Wait for "OK" or "ERROR" from device (visible in terminal and capture)
        waited = 0
        while waited < DFU_RESPONSE_TIMEOUT
          sleep_ms 300
          waited += 300
          cap = JS.global.peekCapture().to_s
          break if cap.index("OK") || cap.index("ERROR")
        end

        resp = JS.global.stopAndGetCapture().to_s
        if resp.index("OK")
          append_log("[+] Success!")
        elsif resp.index("ERROR")
          idx = resp.index("ERROR")
          append_log("[-] #{resp[idx, 60].to_s.strip}")
        else
          append_log("[?] No response after #{DFU_RESPONSE_TIMEOUT}ms (check terminal)")
        end
      end
    end

    App.new
  </script>

  <script src="init.iife.js"></script>
</body>
</html>
