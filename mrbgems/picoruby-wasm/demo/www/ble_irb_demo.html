<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BLE IRB - PicoRuby</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #ccc;
      font-family: 'Cascadia Code', 'Fira Mono', 'Consolas', monospace;
      font-size: 14px; }
    body { display: flex; flex-direction: column; }

    #header {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 12px;
      background: #161616; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    }
    #header a { color: #555; text-decoration: none; font-size: 12px; }
    #header a:hover { color: #aaa; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #553;
      flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.connected  { background: #4d4; }
    #status-dot.connecting { background: #da4; }
    #status-text { font-size: 12px; color: #555; }
    #btn-connect, #btn-disconnect {
      padding: 2px 10px; font-size: 12px;
      background: #1e1e1e; color: #aaa; border: 1px solid #3a3a3a; cursor: pointer;
    }
    #btn-connect:hover:not(:disabled)    { background: #1e3a1e; color: #6d6; }
    #btn-disconnect:hover:not(:disabled) { background: #3a1e1e; color: #d66; }
    button:disabled { opacity: 0.35; cursor: default; }
    #title-label { margin-left: auto; font-size: 11px; color: #333; }

    /* ── terminal ── */
    #terminal {
      flex: 1; overflow-y: auto;
      padding: 10px 14px 14px;
      cursor: text;
    }
    /* clicking anywhere in terminal focuses the current input */

    .line { white-space: pre-wrap; line-height: 1.6; display: flex; }
    .prompt-span { color: #5af; flex-shrink: 0; }
    .code-span   { color: #fff; }
    .result-line { color: #5df; white-space: pre-wrap; line-height: 1.6; }
    .error-line  { color: #f76; white-space: pre-wrap; line-height: 1.6; }
    .info-line   { color: #555; font-style: italic; line-height: 1.6; }

    /* the live input inside the terminal */
    .repl-input {
      flex: 1; min-width: 0;
      background: transparent; border: none; outline: none;
      color: #fff; font-family: inherit; font-size: inherit;
      padding: 0; caret-color: #5af; line-height: 1.6;
    }
    .repl-input:disabled { opacity: 0.2; }
  </style>
</head>
<body>
  <div id="header">
    <a href="index.html">← Back</a>
    <span id="status-dot"></span>
    <span id="status-text">Disconnected</span>
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
    <span id="title-label">BLE IRB / PicoRuby</span>
  </div>
  <div id="terminal"></div>

  <script type="text/ruby">
    require 'js'

    class App
      NUS_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
      NUS_TX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"
      NUS_RX_UUID      = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"
      GETS_TIMEOUT     = 5

      def initialize
        @uart     = nil
        @doc      = JS.document
        @line_no  = 1
        @history  = []
        @hist_idx = nil

        bind_header_events
        add_info("Press 'Connect' to pair with PicoRuby-IRB over BLE.")
        add_info("---")

        # Click anywhere in terminal → focus input
        el('terminal').addEventListener('click') { |_| focus_input }
      end

      def el(id) = @doc.getElementById(id)

      # ── prompt ─────────────────────────────────────────────

      def prompt_str = "irb:%03d> " % @line_no

      # ── output helpers ──────────────────────────────────────

      def add_info(msg)
        d = @doc.createElement('div')
        d[:className] = "info-line"
        d[:textContent] = msg
        el('terminal').appendChild(d)
        scroll_bottom
      end

      def add_output(text, css_class)
        d = @doc.createElement('div')
        d[:className] = css_class
        d[:textContent] = text
        el('terminal').appendChild(d)
        scroll_bottom
      end

      def scroll_bottom
        t = el('terminal')
        t[:scrollTop] = t[:scrollHeight]
      end

      # ── input line management ───────────────────────────────

      # Append a new live prompt+input line at the bottom of terminal
      def append_input_line
        line = @doc.createElement('div')
        line[:className] = "line"
        line[:id] = "active-line"

        ps = @doc.createElement('span')
        ps[:className]   = "prompt-span"
        ps[:textContent] = prompt_str

        inp = @doc.createElement('input')
        inp[:id]           = "code-input"
        inp[:className]    = "repl-input"
        inp[:type]         = "text"
        inp[:autocomplete] = "off"
        inp[:spellcheck]   = "false"

        bind_input_events(inp)

        line.appendChild(ps)
        line.appendChild(inp)
        el('terminal').appendChild(line)
        scroll_bottom
        JS.eval("document.getElementById('code-input')?.focus()")
      end

      # Freeze the current live line (remove input, keep text as span)
      def freeze_input_line(code)
        inp  = el('code-input')
        line = el('active-line')
        return unless inp && line

        line.removeAttribute('id')

        cs = @doc.createElement('span')
        cs[:className]   = "code-span"
        cs[:textContent] = code
        line.replaceChild(cs, inp)
      end

      def focus_input
        inp = el('code-input')
        inp.focus if inp
      end

      # ── event binding ───────────────────────────────────────

      def bind_header_events
        el('btn-connect').addEventListener('click')    { |_| do_connect }
        el('btn-disconnect').addEventListener('click') { |_| do_disconnect }
      end

      def bind_input_events(inp)
        inp.addEventListener('keydown') do |ev|
          case ev[:key].to_s
          when "Enter"
            do_eval
          when "ArrowUp"
            ev.preventDefault
            navigate_history(-1)
          when "ArrowDown"
            ev.preventDefault
            navigate_history(+1)
          end
        end
      end

      # ── history navigation ──────────────────────────────────

      def navigate_history(dir)
        return if @history.empty?
        @hist_idx = @history.length if @hist_idx.nil?
        @hist_idx = (@hist_idx + dir).clamp(0, @history.length - 1)
        inp = el('code-input')
        inp[:value] = @history[@hist_idx] if inp
      end

      # ── connection UI ───────────────────────────────────────

      def set_status(state)
        case state
        when :connected
          el('status-dot')[:className]    = "connected"
          el('status-text')[:textContent] = "Connected"
          el('btn-connect').setAttribute("disabled", "true")
          el('btn-disconnect').removeAttribute("disabled")
        when :connecting
          el('status-dot')[:className]    = "connecting"
          el('status-text')[:textContent] = "Connecting..."
          el('btn-connect').setAttribute("disabled", "true")
          el('btn-disconnect').setAttribute("disabled", "true")
        when :disconnected
          el('status-dot')[:className]    = ""
          el('status-text')[:textContent] = "Disconnected"
          el('btn-connect').removeAttribute("disabled")
          el('btn-disconnect').setAttribute("disabled", "true")
        end
      end

      def disable_input
        inp = el('code-input')
        inp.setAttribute("disabled", "true") if inp
      end

      def do_connect
        set_status(:connecting)
        add_info("Scanning for PicoRuby-IRB...")
        begin
          @uart = JS::BLE::UART.new(
            service_uuid: NUS_SERVICE_UUID,
            tx_uuid:      NUS_TX_UUID,
            rx_uuid:      NUS_RX_UUID,
            name_prefix:  "Pico"
          )
          add_info("Connected to: #{@uart.device.name || '(unnamed)'}")
          set_status(:connected)
          append_input_line
        rescue => e
          add_info("Error: #{e.message}")
          set_status(:disconnected)
        end
      end

      def do_disconnect
        return unless @uart
        disable_input
        @uart.close
        @uart = nil
        add_info("Disconnected.")
        set_status(:disconnected)
      end

      # ── eval ────────────────────────────────────────────────

      def do_eval
        return unless @uart && @uart.connected?
        inp  = el('code-input')
        return unless inp
        code = inp[:value].to_s.strip
        return if code.empty?

        @history << code
        @hist_idx = nil

        freeze_input_line(code)
        @line_no += 1

        @uart.puts(code)
        response = @uart.gets(timeout: GETS_TIMEOUT)
        if response
          css = response.start_with?("!>") ? "error-line" : "result-line"
          add_output(response.chomp, css)
        else
          add_output("(timeout: no response)", "error-line")
        end

        append_input_line
      end
    end

    App.new
  </script>
  <script src="init.iife.js"></script>
</body>
</html>
