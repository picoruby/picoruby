<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keymap Editor (Funicular) - DRb over WebSocket</title>
</head>
<body>
  <div id="app"></div>

  <script type="text/ruby">
    require 'drb'

    $service = nil

    # USB HID keycode names (from keycode.txt)
    KEYCODE_NAMES = {
      0x04 => "A",     0x05 => "B",     0x06 => "C",     0x07 => "D",
      0x08 => "E",     0x09 => "F",     0x0A => "G",     0x0B => "H",
      0x0C => "I",     0x0D => "J",     0x0E => "K",     0x0F => "L",
      0x10 => "M",     0x11 => "N",     0x12 => "O",     0x13 => "P",
      0x14 => "Q",     0x15 => "R",     0x16 => "S",     0x17 => "T",
      0x18 => "U",     0x19 => "V",     0x1A => "W",     0x1B => "X",
      0x1C => "Y",     0x1D => "Z",
      0x1E => "1",     0x1F => "2",     0x20 => "3",     0x21 => "4",
      0x22 => "5",     0x23 => "6",     0x24 => "7",     0x25 => "8",
      0x26 => "9",     0x27 => "0",
      0x28 => "ENTER", 0x29 => "ESC",   0x2A => "BSPC",  0x2B => "TAB",
      0x2C => "SPACE",
      0x2D => "-",     0x2E => "=",     0x2F => "[",     0x30 => "]",
      0x31 => "\\",   0x33 => ";",     0x34 => "'",     0x35 => "`",
      0x36 => ",",     0x37 => ".",     0x38 => "/",
      0x3A => "F1",    0x3B => "F2",    0x3C => "F3",    0x3D => "F4",
      0x3E => "F5",    0x3F => "F6",    0x40 => "F7",    0x41 => "F8",
      0x42 => "F9",    0x43 => "F10",   0x44 => "F11",   0x45 => "F12",
      0x49 => "INS",   0x4A => "HOME",  0x4B => "PGUP",
      0x4C => "DEL",   0x4D => "END",   0x4E => "PGDN",
      0x4F => "RIGHT", 0x50 => "LEFT",  0x51 => "DOWN",  0x52 => "UP"
    }

    MOD_NAMES = {
      0xE0 => "LCTL", 0xE1 => "LSFT", 0xE2 => "LALT", 0xE3 => "LGUI",
      0xE4 => "RCTL", 0xE5 => "RSFT", 0xE6 => "RALT", 0xE7 => "RGUI"
    }

    MO_BASE = 0xE000
    TG_BASE = 0xE100
    LT_BASE = 0xE200
    MT_BASE = 0xF200
    SM_BASE = 0xFA00

    def kc_name(kc)
      return "---" if kc == 0 || kc.nil?
      if MO_BASE <= kc && kc < MO_BASE + 256
        "MO(#{kc - MO_BASE})"
      elsif TG_BASE <= kc && kc < TG_BASE + 256
        "TG(#{kc - TG_BASE})"
      elsif LT_BASE <= kc && kc < LT_BASE + 4096
        layer = (kc - LT_BASE) >> 8
        tap   = (kc - LT_BASE) & 0xFF
        tap_s = KEYCODE_NAMES[tap] || "0x#{tap.to_s(16).upcase}"
        "LT(#{layer},#{tap_s})"
      elsif MT_BASE <= kc && kc < MT_BASE + 2048
        mod_idx  = (kc - MT_BASE) >> 8
        tap      = (kc - MT_BASE) & 0xFF
        mod_name = MOD_NAMES[0xE0 + mod_idx] || "MOD#{mod_idx}"
        tap_s    = KEYCODE_NAMES[tap] || "0x#{tap.to_s(16).upcase}"
        "MT(#{mod_name},#{tap_s})"
      elsif SM_BASE <= kc && kc < SM_BASE + 256
        base  = kc - SM_BASE
        base_s = KEYCODE_NAMES[base] || "0x#{base.to_s(16).upcase}"
        "S(#{base_s})"
      elsif KEYCODE_NAMES.key?(kc)
        KEYCODE_NAMES[kc]
      else
        "0x#{kc.to_s(16).upcase}"
      end
    end

    # -------------------------------------------------------------------------
    # LogPanel: scrollable log with auto-scroll to bottom on update
    # -------------------------------------------------------------------------
    class LogPanel < Funicular::Component
      def component_updated
        el = refs[:log_box]
        el.scrollTop = el.scrollHeight if el
      end

      def render
        div(ref: :log_box, class: 'log-box') do
          props[:messages].each do |msg|
            div(class: "log-#{msg[:type]}") { msg[:text] }
          end
        end
      end
    end

    # -------------------------------------------------------------------------
    # LayerTabs: row of buttons to switch active layer
    # -------------------------------------------------------------------------
    class LayerTabs < Funicular::Component
      def render
        on_select = props[:on_select]
        current   = props[:current_layer]
        div(class: 'layer-tabs') do
          props[:layers].each_key do |name|
            cls = (name == current) ? 'tab active' : 'tab'
            button(class: cls, onclick: -> { on_select.call(name) }) { name.to_s }
          end
        end
      end
    end

    # -------------------------------------------------------------------------
    # GherkinGrid: 10-col x 3-row key grid for Gherkin (30 keys)
    # -------------------------------------------------------------------------
    class GherkinGrid < Funicular::Component
      def render
        on_click = props[:on_cell_click]
        keymap   = props[:keymap]
        div(class: 'grid') do
          keymap.each_with_index do |kc, i|
            label = kc_name(kc)
            cls   = (kc == 0 || kc.nil?) ? 'key transparent' : 'key'
            button(class: cls, onclick: -> { on_click.call(i) }) { label }
          end
        end
      end
    end

    # -------------------------------------------------------------------------
    # KeyPicker: modal overlay for selecting a new keycode
    # -------------------------------------------------------------------------
    class KeyPicker < Funicular::Component
      def render
        on_pick   = props[:on_pick]
        on_cancel = props[:on_cancel]
        cell_idx  = props[:cell_index]
        current   = props[:current_kc]

        div(class: 'overlay') do
          div(class: 'modal') do
            div(class: 'modal-header') do
              h3 { "Key #{cell_idx}  /  current: #{kc_name(current)}" }
              button(class: 'close-btn', onclick: on_cancel) { 'x' }
            end
            div(class: 'modal-body') do
              pick_section("Transparent / No key",
                { 0x00 => "---" }, on_pick)
              pick_section("Letters", letters_map, on_pick)
              pick_section("Numbers", numbers_map, on_pick)
              pick_section("Common keys", common_map, on_pick)
              pick_section("Punctuation", punct_map, on_pick)
              pick_section("Arrows", arrows_map, on_pick)
              pick_section("Function keys", fkeys_map, on_pick)
              pick_section("Layer-Tap  LT(n, SPACE)", lt_map, on_pick)
              pick_section("Momentary  MO(n)", mo_map, on_pick)
              pick_section("Toggle     TG(n)", tg_map, on_pick)
            end
          end
        end
      end

      def pick_section(title, keycode_map, on_pick)
        div(class: 'pick-section') do
          p(class: 'pick-title') { title }
          div(class: 'pick-row') do
            keycode_map.each do |kc, name|
              button(class: 'pick-btn', onclick: -> { on_pick.call(kc) }) { name }
            end
          end
        end
      end

      def letters_map
        h = {}
        (0x04..0x1D).each { |c| h[c] = KEYCODE_NAMES[c] }
        h
      end

      def numbers_map
        h = {}
        (0x1E..0x27).each { |c| h[c] = KEYCODE_NAMES[c] }
        h
      end

      def common_map
        {
          0x28 => "ENTER", 0x29 => "ESC",  0x2A => "BSPC", 0x2B => "TAB",
          0x2C => "SPACE", 0x4C => "DEL",  0x4A => "HOME", 0x4D => "END",
          0x4B => "PGUP",  0x4E => "PGDN"
        }
      end

      def punct_map
        {
          0x2D => "-",  0x2E => "=",  0x2F => "[",  0x30 => "]",
          0x31 => "\\", 0x33 => ";",  0x34 => "'",  0x35 => "`",
          0x36 => ",",  0x37 => ".",  0x38 => "/"
        }
      end

      def arrows_map
        { 0x4F => "RIGHT", 0x50 => "LEFT", 0x51 => "DOWN", 0x52 => "UP" }
      end

      def fkeys_map
        h = {}
        (0x3A..0x45).each { |c| h[c] = KEYCODE_NAMES[c] }
        h
      end

      def lt_map
        h = {}
        (0..4).each { |n| h[LT_BASE + (n << 8) + 0x2C] = "LT(#{n},SPACE)" }
        h
      end

      def mo_map
        h = {}
        (0..4).each { |n| h[MO_BASE + n] = "MO(#{n})" }
        h
      end

      def tg_map
        h = {}
        (0..4).each { |n| h[TG_BASE + n] = "TG(#{n})" }
        h
      end
    end

    # -------------------------------------------------------------------------
    # KeymapEditor: root component that owns all state
    # -------------------------------------------------------------------------
    class KeymapEditor < Funicular::Component
      def initialize_state
        {
          connected:     false,
          layers:        nil,
          current_layer: nil,
          editing:       nil,  # working copy of current layer's keymap
          picking_cell:  -1,   # -1 = picker closed; >= 0 = cell index being edited
          log:           []
        }
      end

      def add_log(msg, type = :info)
        patch(log: state.log + [{ text: msg, type: type }])
      end

      def connect
        ip  = refs[:ip_input].value
        uri = "ws://#{ip}:9090"
        add_log("Connecting to #{uri}...")
        begin
          $service = DRb::DRbObject.new_with_uri(uri)
          patch(connected: true)
          add_log("Connected to #{uri}", :success)
        rescue => e
          add_log("Connection failed: #{e.message}", :error)
        end
      end

      def disconnect
        $service = nil
        patch(connected: false, layers: nil, current_layer: nil, editing: nil)
        add_log("Disconnected")
      end

      def get_layers
        add_log("Fetching layers from device...")
        begin
          layers = $service.layers
          first  = layers.keys.first
          patch(layers: layers, current_layer: first, editing: layers[first].dup)
          names = layers.keys.map { |k| k.to_s }.join(", ")
          add_log("Got #{layers.size} layer(s): #{names}", :success)
        rescue => e
          add_log("Error: #{e.message}", :error)
        end
      end

      def select_layer(name)
        patch(current_layer: name, editing: state.layers[name].dup)
      end

      def pick_keycode(kc)
        keymap = state.editing.dup
        keymap[state.picking_cell] = kc
        patch(editing: keymap, picking_cell: -1)
      end

      def apply_changes
        begin
          $service.add_layer(state.current_layer, state.editing)
          new_layers = {}
          state.layers.each { |k, v| new_layers[k] = v }
          new_layers[state.current_layer] = state.editing.dup
          patch(layers: new_layers)
          add_log("Layer :#{state.current_layer} applied to device", :success)
        rescue => e
          add_log("Apply error: #{e.message}", :error)
        end
      end

      def render
        div(class: 'app') do
          # -- Header --
          div(class: 'header') do
            a(href: 'index.html', class: 'back') { 'Back' }
            h1 { 'Keymap Editor' }
            span(class: state.connected ? 'badge on' : 'badge off') {
              state.connected ? 'Connected' : 'Disconnected'
            }
          end

          # -- Connection panel --
          div(class: 'panel') do
            label { 'IP Address:' }
            span(class: 'uri-pre') { 'ws://' }
            input(
              type:        'text',
              ref:         :ip_input,
              placeholder: '192.168.x.x',
              class:       'ip-input'
            )
            span(class: 'uri-suf') { ':9090' }
            button(
              class:    'btn',
              onclick:  :connect,
              disabled: state.connected
            ) { 'Connect' }
            button(
              class:    'btn btn-danger',
              onclick:  :disconnect,
              disabled: !state.connected
            ) { 'Disconnect' }
            button(
              class:    'btn',
              onclick:  :get_layers,
              disabled: !state.connected
            ) { 'Get Layers' }
          end

          # -- Layer tabs + grid (visible after loading layers) --
          if state.layers
            div(class: 'section') do
              h2 { 'Layers' }
              component(LayerTabs,
                layers:        state.layers,
                current_layer: state.current_layer,
                on_select:     ->(name) { select_layer(name) }
              )
            end

            div(class: 'section') do
              h2 { "Editing layer: #{state.current_layer}" }
              component(GherkinGrid,
                keymap:        state.editing,
                on_cell_click: ->(i) { patch(picking_cell: i) }
              )
              div(class: 'action-row') do
                button(class: 'btn btn-success', onclick: :apply_changes) {
                  'Apply to Device'
                }
                button(class: 'btn', onclick: :get_layers) {
                  'Reload from Device'
                }
              end
            end
          end

          # -- Log --
          component(LogPanel, messages: state.log)

          # -- Key picker modal (shown when picking_cell >= 0) --
          if 0 <= state.picking_cell
            component(KeyPicker,
              cell_index: state.picking_cell,
              current_kc: state.editing[state.picking_cell],
              on_pick:    ->(kc) { pick_keycode(kc) },
              on_cancel:  -> { patch(picking_cell: -1) }
            )
          end
        end
      end
    end

    Funicular.start(KeymapEditor, container: 'app')
    puts "Keymap Editor started"
  </script>
  <script src="../init.iife.js"></script>
</body>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
}

.app {
  max-width: 1020px;
  margin: 0 auto;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 3px solid #2196F3;
}
.back { color: #2196F3; text-decoration: none; font-size: 14px; }
.back:hover { text-decoration: underline; }
h1 { font-size: 22px; color: #333; flex: 1; }
h2 { font-size: 16px; color: #444; margin-bottom: 8px; }

.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
}
.badge.on  { background: #4CAF50; color: white; }
.badge.off { background: #f44336; color: white; }

/* Connection panel */
.panel {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  background: white;
  padding: 16px;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  margin-bottom: 16px;
}
label { font-weight: bold; color: #555; font-size: 14px; }
.uri-pre, .uri-suf { font-family: monospace; color: #777; font-size: 14px; }
.ip-input {
  padding: 8px 10px;
  border: 2px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
  width: 150px;
}
.ip-input:focus { outline: none; border-color: #2196F3; }

/* Buttons */
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  background: #2196F3;
  color: white;
  font-weight: bold;
}
.btn:hover:not(:disabled) { background: #1976D2; }
.btn:disabled { background: #bbb; cursor: not-allowed; }
.btn-danger { background: #f44336; }
.btn-danger:hover:not(:disabled) { background: #d32f2f; }
.btn-success { background: #4CAF50; }
.btn-success:hover:not(:disabled) { background: #388E3C; }

/* Sections */
.section {
  background: white;
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  margin-bottom: 16px;
}

/* Layer tabs */
.layer-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  padding: 6px 16px;
  border: 2px solid #ddd;
  border-radius: 20px;
  cursor: pointer;
  background: #f5f5f5;
  color: #555;
  font-size: 13px;
  font-weight: bold;
}
.tab:hover { background: #e3f2fd; border-color: #90caf9; }
.tab.active { background: #2196F3; color: white; border-color: #2196F3; }

/* Gherkin key grid: 10 columns */
.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 5px;
  margin-bottom: 12px;
}
.key {
  padding: 6px 2px;
  border: 2px solid #ccc;
  border-radius: 5px;
  background: #e8e8e8;
  cursor: pointer;
  font-size: 10px;
  font-weight: bold;
  text-align: center;
  min-height: 46px;
  width: 100%;
  color: #333;
  word-break: break-all;
  line-height: 1.3;
  display: flex;
  align-items: center;
  justify-content: center;
}
.key:hover { background: #BBDEFB; border-color: #2196F3; }
.key.transparent { color: #bbb; font-weight: normal; }

.action-row { display: flex; gap: 8px; }

/* Log panel */
.log-box {
  background: #1e1e1e;
  color: #aaa;
  padding: 12px;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  max-height: 180px;
  overflow-y: auto;
  margin-bottom: 16px;
}
.log-info    { color: #64B5F6; }
.log-success { color: #81C784; }
.log-error   { color: #E57373; }

/* Modal overlay */
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.55);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 48px;
  z-index: 200;
}
.modal {
  background: white;
  border-radius: 10px;
  width: 90%;
  max-width: 660px;
  max-height: 78vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.modal-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #eee;
}
.modal-header h3 { flex: 1; font-size: 15px; color: #333; }
.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: #888;
  padding: 0 4px;
  font-weight: bold;
}
.close-btn:hover { color: #333; }
.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
}

/* Key picker sections */
.pick-section { margin-bottom: 10px; }
.pick-title {
  font-size: 11px;
  font-weight: bold;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 5px;
}
.pick-row { display: flex; flex-wrap: wrap; gap: 3px; }
.pick-btn {
  padding: 5px 9px;
  border: 1px solid #ddd;
  border-radius: 3px;
  cursor: pointer;
  background: #f5f5f5;
  font-size: 11px;
  font-weight: bold;
  color: #333;
  min-width: 36px;
  text-align: center;
}
.pick-btn:hover { background: #2196F3; color: white; border-color: #2196F3; }
</style>
</html>
