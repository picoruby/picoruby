name: C/C++ CI

on:
  push:
    branches:
      - master
      - ci-test
  pull_request:
    branches:
      - master

env:
  GIT_DISCOVERY_ACROSS_FILESYSTEM: 1

permissions:
  contents: write
  pull-requests: write

jobs:

  test-steep:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout recursive
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.1'
        bundler-cache: true

    - name: Test Steep
      run: rake test:gems:steep

  test-microruby:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout recursive
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.1'
        bundler-cache: true

    - name: Test MicroRuby
      run: rake test:gems:microruby

  test-picoruby:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout recursive
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.1'
        bundler-cache: true

    - name: Test PicoRuby
      run: rake test:gems:picoruby

  runtime-gems:

    if: github.event_name == 'push'
    needs: [test-steep, test-microruby, test-picoruby]
    runs-on: ubuntu-latest

    steps:

    - name: Checkout recursive
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.1'
        bundler-cache: true

    - name: Set up Git user
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run `rake runtime_gems`
      if: github.event_name == 'push'
      run: |
        rake runtime_gems

    - name: Commit RuntimeGems
      if: github.event_name == 'push'
      run: |
        git add runtime_gems/
        if ! git diff --cached --quiet; then
          git commit -m "Update RuntimeGems [skip ci]"
        fi

    - name: Create Pull Request for RuntimeGems update
      if: github.event_name == 'push'
      uses: peter-evans/create-pull-request@v5
      with:
        commit-message: "Update RuntimeGems [skip ci]"
        title: "Update RuntimeGems"
        body: "Automated update of RuntimeGems."
        branch: "auto/update-runtimegems"
        delete-branch: true
